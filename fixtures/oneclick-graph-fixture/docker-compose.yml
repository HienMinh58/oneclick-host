services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      API_BASE_URL: http://api:8000
      PUBLIC_ENV_LABEL: graph-fixture
    depends_on:
      api:
        condition: service_started
    networks:
      - public
      - internal

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://app:app_password@db:5432/appdb
      REDIS_URL: redis://redis:6379/0
      API_SECRET_TOKEN: demo-secret-token
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - api-cache:/app/cache
    networks:
      - internal

  worker:
    build:
      context: ./worker
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://app:app_password@db:5432/appdb
      REDIS_URL: redis://redis:6379/0
      API_URL: http://api:8000
      WORKER_QUEUE: default
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - worker-state:/app/state
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  postgres-data:
  redis-data:
  api-cache:
  worker-state:

networks:
  public:
  internal:
