services:
  db:
    image: postgres:16-alpine
    container_name: oneclick-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneclickhost}
      POSTGRES_USER: ${POSTGRES_USER:-oneclick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneclick} -d ${POSTGRES_DB:-oneclickhost}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - control-net

  traefik:
    image: traefik:v3.4
    container_name: oneclick-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - control-net
      - apps-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oneclick-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-oneclickhost};Username=${POSTGRES_USER:-oneclick};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set}
      Jwt__Issuer: ${JWT_ISSUER:-oneclick-host}
      Jwt__Audience: ${JWT_AUDIENCE:-oneclick-host-client}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-24}
      AntiAbuse__MaxActiveServicesPerUser: ${MAX_ACTIVE_SERVICES_PER_USER:-20}
      AntiAbuse__DeploymentRateLimitPerMinute: ${DEPLOYMENT_RATE_LIMIT_PER_MINUTE:-10}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - control-net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: oneclick-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oneclick}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-oneclickhost}
      POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      BUILD_TIMEOUT: ${WORKER_BUILD_TIMEOUT:-900}
      MAX_CONCURRENT_BUILDS: ${MAX_CONCURRENT_BUILDS:-1}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/tmp/oneclick-workspace}
      TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-localhost}
      TRAEFIK_NETWORK: oneclick-apps-net
      CONTAINER_MEMORY_LIMIT: ${CONTAINER_MEMORY_LIMIT:-256m}
      CONTAINER_CPU_LIMIT: ${CONTAINER_CPU_LIMIT:-0.5}
      CONTAINER_PIDS_LIMIT: ${CONTAINER_PIDS_LIMIT:-256}
    volumes:
      # Trusted infrastructure only. Docker socket access is root-equivalent on the host.
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_workspace:/tmp/oneclick-workspace
      - ./traefik/dynamic:/etc/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
    networks:
      - control-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oneclick-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    networks:
      - control-net

volumes:
  postgres_data:
  worker_workspace:

networks:
  control-net:
    name: oneclick-control-net
    driver: bridge
  apps-net:
    name: oneclick-apps-net
    driver: bridge
