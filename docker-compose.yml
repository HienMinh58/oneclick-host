# BUG #6 FIX: Set a fixed project name so the Docker network is always
# named 'oneclick_oneclick-net' regardless of the folder name.
# This must match TRAEFIK_NETWORK in .env
name: oneclick

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: oneclick-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneclickhost}
      POSTGRES_USER: ${POSTGRES_USER:-oneclick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneclick_dev_password}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneclick} -d ${POSTGRES_DB:-oneclickhost}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # Traefik Reverse Proxy
  # ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.4
    container_name: oneclick-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "127.0.0.1:8081:8080"   # Local-only Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # ASP.NET Core API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oneclick-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-Host=db;Port=5432;Database=oneclickhost;Username=oneclick;Password=${POSTGRES_PASSWORD:-oneclick_dev_password}}
      Jwt__Secret: ${JWT_SECRET:-oneclick-dev-jwt-secret-minimum-32-chars}
      SecretEncryption__Key: ${ONECLICK_SECRET_KEY:-oneclick-dev-secret-key-minimum-32-chars}
      Jwt__Issuer: ${JWT_ISSUER:-oneclick-host}
      Jwt__Audience: ${JWT_AUDIENCE:-oneclick-host-client}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-24}
      ONECLICK_ENABLE_POST_START_COMMANDS: ${ONECLICK_ENABLE_POST_START_COMMANDS:-false}
      # ISSUE #10 FIX: ASP.NET Core maps Cors__AllowedOrigins → Cors:AllowedOrigins
      # Set CORS_ORIGINS in .env to your production domain
      AI__Provider: ${AI_PROVIDER:-OpenAI}
      AI__ApiKey: ${AI_API_KEY:-}
      AI__Model: ${AI_MODEL:-gpt-4o-mini}
      Cors__AllowedOrigins: ${CORS_ORIGINS:-http://localhost:3000}
      ExecutionNodes__RegistrationToken: ${EXECUTION_NODE_REGISTRATION_TOKEN:-}
      ExecutionNodes__LeaseTimeoutSeconds: ${EXECUTION_NODE_LEASE_TIMEOUT_SECONDS:-120}
      ExecutionNodes__MaxLeaseRetries: ${EXECUTION_NODE_MAX_LEASE_RETRIES:-3}
      ExecutionNodes__RetryDelaySeconds: ${EXECUTION_NODE_RETRY_DELAY_SECONDS:-30}
      Traefik__DynamicDirectory: ${TRAEFIK_DYNAMIC_DIR:-/etc/traefik/dynamic}
      OneClick__LogMaxBytes: ${LOG_MAX_BYTES:-200000}
      OneClick__AutoMigrateDatabase: ${AUTO_MIGRATE_DATABASE:-false}
    ports:
      - "${API_BIND:-127.0.0.1}:5000:5000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=(Host(`localhost`) || Host(`${TRAEFIK_DOMAIN:-localhost}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=5000"
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # Python Worker
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: oneclick-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oneclick}:${POSTGRES_PASSWORD:-oneclick_dev_password}@db:5432/${POSTGRES_DB:-oneclickhost}
      POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      WORKER_MODE: ${WORKER_MODE:-singlehost-dev}
      BUILD_TIMEOUT: ${WORKER_BUILD_TIMEOUT:-900}
      MAX_CONCURRENT_BUILDS: ${MAX_CONCURRENT_BUILDS:-1}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-200000}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/tmp/oneclick-workspace}
      TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-localhost}
      TRAEFIK_NETWORK: ${TRAEFIK_NETWORK:-oneclick_oneclick-net}
      CONTROL_PLANE_API_URL: ${CONTROL_PLANE_API_URL:-http://api:5000/api}
      EXECUTION_NODE_ID: ${EXECUTION_NODE_ID:-}
      EXECUTION_NODE_TOKEN: ${EXECUTION_NODE_TOKEN:-}
      EXECUTION_NODE_PRIVATE_HOST: ${EXECUTION_NODE_PRIVATE_HOST:-}
      EXECUTION_NODE_BIND_HOST: ${EXECUTION_NODE_BIND_HOST:-0.0.0.0}
      EXECUTION_NODE_REGISTRATION_TOKEN: ${EXECUTION_NODE_REGISTRATION_TOKEN:-}
      ONECLICK_SECRET_KEY: ${ONECLICK_SECRET_KEY:-oneclick-dev-secret-key-minimum-32-chars}
      ONECLICK_ENABLE_POST_START_COMMANDS: ${ONECLICK_ENABLE_POST_START_COMMANDS:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_workspace:/tmp/oneclick-workspace
      - ./traefik/dynamic:/etc/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # React + Vite Frontend Dashboard
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: oneclick-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`) || Host(`${TRAEFIK_DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - oneclick-net

volumes:
  postgres_data:
  worker_workspace:

networks:
  oneclick-net:
    driver: bridge
