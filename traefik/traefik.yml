# Traefik Static Configuration
# ─────────────────────────────────────

api:
  dashboard: true
  insecure: true    # Dashboard on :8080 without auth (dev only)

entryPoints:
  web:
    address: ":80"

providers:
  # NOTE: Docker provider disabled on Windows Docker Desktop due to socket
  # access issues. Enable on Linux/production servers by uncommenting below:
  # docker:
  #   endpoint: "unix:///var/run/docker.sock"
  #   exposedByDefault: false
  #   network: oneclick_oneclick-net
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

log:
  level: INFO

accessLog: {}
