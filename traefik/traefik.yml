# Traefik static configuration for production.
# The dashboard is disabled by default and no dashboard port is published in
# docker-compose.yml. Use docker-compose.dev.yml for opt-in local dashboard use.

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

log:
  level: INFO

accessLog: {}
